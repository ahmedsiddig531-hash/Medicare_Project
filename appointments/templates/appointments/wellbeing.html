 {% extends "base.html" %}

{% block content %}

<div class="container">

<h1 class="page-title">Well-Being & Healthy Living</h1>

<div class="articles-grid">

{% for article in articles %}

<div class="article-card">

{% if article.image %}
<img src="{{ article.image.url }}" class="article-img">
{% endif %}

<div class="article-body">

<span class="category">{{ article.category }}</span>

<h3>{{ article.title }}</h3>

<p>{{ article.content|truncatewords:20 }}</p>

<p class="views">Views: {{ article.views }}</p>

<a href="{% url 'article_detail' article.id %}" class="read-btn">
Read Article
</a>

</div>

</div>

{% endfor %}

</div>

</div>

{% endblock %}
